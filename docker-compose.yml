services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/db.sqlite
      - SECRET_KEY=this_is_a_secret_key_for_jwt_for_ryan
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload